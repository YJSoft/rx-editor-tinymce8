<config autoescape="on" />

<include target="config.blade.php" />

<load target="css/rhymix.scss" vars="$tinymce8_css_vars" />
<load target="^/common/css/xeicon/xeicon.min.css" />
<load target="../../tpl/js/editor_common.js" />
<load target="vendor/tinymce/tinymce.min.js" />
<load target="js/rhymix.js" />

<div id="tinymce8_instance_{$editor_sequence}" class="rx-tinymce8 rx-tinymce8--{$tinymce8_colorset}"
	data-editor-sequence="{$editor_sequence}"
	data-editor-primary-key-name="{$editor_primary_key_name}"
	data-editor-content-key-name="{$editor_content_key_name}"
	data-editor-config="{$tinymce8_config_json}"
	style="--rx-tinymce8-height: {$tinymce8_config['height']}px;">
	<div class="rx-tinymce8__loading" role="status" aria-live="polite">TinyMCE 8</div>
	<textarea id="tinymce8_source_{$editor_sequence}" class="rx-tinymce8__source" aria-label="TinyMCE 8"></textarea>
</div>

<!--@if($enable_autosave)-->
<p id="editor_autosaved_message_{$editor_sequence}" class="editor_autosaved_message autosave_message">&nbsp;</p>
<input type="hidden" name="_saved_doc_title" value="{empty($saved_doc) ? '' : $saved_doc->title}" />
<input type="hidden" name="_saved_doc_content" value="{empty($saved_doc) ? '' : $saved_doc->content}" />
<input type="hidden" name="_saved_doc_document_srl" value="{empty($saved_doc) ? '' : $saved_doc->document_srl}" />
<input type="hidden" name="_saved_doc_message" value="{$lang->msg_load_saved_doc}" />
<script>window.auto_saved_msg = {$lang->msg_auto_saved|json|noescape};</script>
<!--@endif-->

<!--@if($allow_fileupload)-->
<include target="../ckeditor/file_upload.html" />
<!--@endif-->
